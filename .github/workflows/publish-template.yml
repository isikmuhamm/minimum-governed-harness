name: Publish clean template

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check release credential
        env:
          TEMPLATE_TOKEN: ${{ secrets.CONTEXTRAIL_TEMPLATE_TOKEN }}
        run: |
          if [ -z "$TEMPLATE_TOKEN" ]; then
            echo "Repository secret CONTEXTRAIL_TEMPLATE_TOKEN is required."
            exit 1
          fi

      - name: Check out ContextRail source
        uses: actions/checkout@v4
        with:
          path: source

      - name: Check out published template
        uses: actions/checkout@v4
        with:
          repository: isikmuhamm/contextrail-template
          token: ${{ secrets.CONTEXTRAIL_TEMPLATE_TOKEN }}
          path: target

      - name: Mirror template payload
        run: |
          find target -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a source/template/. target/

      - name: Publish changes
        working-directory: target
        run: |
          git config user.name "ContextRail Publisher"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Template repository is already current."
            exit 0
          fi
          git commit -m "chore: publish ContextRail ${GITHUB_REF_NAME}"
          git push
