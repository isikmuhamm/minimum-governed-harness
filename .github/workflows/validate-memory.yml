name: Validate ContextRail distribution

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate clean template
        run: sh template/scripts/validate-linux.sh --root template --strict
      - name: Validate ContextRail repository memory
        run: sh template/scripts/validate-linux.sh --root . --strict
      - name: Validate task-linked trace fixture
        run: sh template/scripts/validate-linux.sh --root tests/fixtures/valid-trace --strict
      - name: Confirm invalid fixture failures
        run: |
          set +e
          output="$(sh template/scripts/validate-linux.sh --root tests/fixtures/invalid 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$output"
          if [ "$status" -eq 0 ]; then
            echo "Invalid fixture unexpectedly passed"
            exit 1
          fi
          printf '%s\n' "$output" | grep -F "Duplicate normalized TASK title 'broken task'"
          printf '%s\n' "$output" | grep -F "TASK-9997 has Notes detail but no Board or History lifecycle record"
          printf '%s\n' "$output" | grep -F "src/broken.py:1 references TASK-8888 without Board or History lifecycle record"

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate clean template
        run: sh template/scripts/validate-macos.sh --root template --strict
      - name: Validate ContextRail repository memory
        run: sh template/scripts/validate-macos.sh --root . --strict
      - name: Validate task-linked trace fixture
        run: sh template/scripts/validate-macos.sh --root tests/fixtures/valid-trace --strict
      - name: Confirm invalid fixture failures
        run: |
          set +e
          output="$(sh template/scripts/validate-macos.sh --root tests/fixtures/invalid 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$output"
          if [ "$status" -eq 0 ]; then
            echo "Invalid fixture unexpectedly passed"
            exit 1
          fi
          printf '%s\n' "$output" | grep -F "Duplicate normalized TASK title 'broken task'"
          printf '%s\n' "$output" | grep -F "TASK-9997 has Notes detail but no Board or History lifecycle record"
          printf '%s\n' "$output" | grep -F "src/broken.py:1 references TASK-8888 without Board or History lifecycle record"

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate clean template
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File template\scripts\validate-windows.ps1 -Root template -Strict
      - name: Validate ContextRail repository memory
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File template\scripts\validate-windows.ps1 -Root . -Strict
      - name: Validate task-linked trace fixture
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File template\scripts\validate-windows.ps1 -Root tests\fixtures\valid-trace -Strict
      - name: Confirm invalid fixture failures
        shell: powershell
        run: |
          $output = & powershell -NoProfile -ExecutionPolicy Bypass -File template\scripts\validate-windows.ps1 -Root tests\fixtures\invalid 2>&1
          $status = $LASTEXITCODE
          $text = $output | Out-String
          Write-Host $text
          if ($status -eq 0) {
            Write-Error "Invalid fixture unexpectedly passed"
            exit 1
          }
          $expected = @(
            "Duplicate normalized TASK title 'broken task'",
            "TASK-9997 has Notes detail but no Board or History lifecycle record",
            "src/broken.py:1 references TASK-8888 without Board or History lifecycle record"
          )
          foreach ($message in $expected) {
            if (-not $text.Contains($message)) {
              Write-Error "Expected validator finding was not emitted: $message"
              exit 1
            }
          }
          exit 0

  published-template-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone published template
        run: git clone --depth 1 https://github.com/isikmuhamm/contextrail-template.git published-template
      - name: Require equality for the same declared version
        run: |
          set -eu
          source_version="$(tr -d '[:space:]' < template/.contextrail-version)"
          published_version="$(tr -d '[:space:]' < published-template/.contextrail-version)"

          if [ "$source_version" = "$published_version" ]; then
            echo "Both repositories declare ContextRail ${source_version}; their payloads must be identical."
            diff -qr --exclude=.git template published-template
          else
            echo "Unreleased source version ${source_version}; published template remains ${published_version}."
          fi
